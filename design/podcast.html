<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声读 - AI 播客</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .toggle-checkbox:checked { right: 0; border-color: #FF9500; }
        .toggle-checkbox:checked + .toggle-label { background-color: #FF9500; }
    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen font-sans">
    <div id="app" class="w-[390px] h-[844px] bg-[#050505] rounded-[40px] overflow-hidden relative shadow-2xl flex flex-col border-[8px] border-gray-800">
        
        <div class="h-14 flex justify-between items-center px-4 border-b border-white/5 mt-8">
            <button class="text-white"><i class="fas fa-chevron-left"></i></button>
            <h1 class="text-white font-bold text-base"><i class="fas fa-podcast text-purple-400"></i> AI 播客</h1>
            <div class="w-8"></div>
        </div>

        <div class="flex-1 overflow-y-auto px-4 pt-4 pb-24">
            <h2 class="text-white text-sm font-bold mb-3">内容来源</h2>
            <div class="flex p-1 bg-black border border-white/10 rounded-xl mb-6">
                <button class="flex-1 py-2 text-xs font-bold rounded-lg bg-white/10 text-white">💡 输入主题</button>
                <button class="flex-1 py-2 text-xs font-bold rounded-lg text-gray-500">🔗 提取链接</button>
                <button class="flex-1 py-2 text-xs font-bold rounded-lg text-gray-500">📝 原文直读</button>
            </div>
            <div class="glass-panel rounded-2xl p-4 mb-6">
                <textarea class="w-full bg-transparent text-white outline-none resize-none text-[15px]" rows="3" placeholder="输入你想让主播聊的主题..."></textarea>
            </div>

            <h2 class="text-white text-sm font-bold mb-3">主播阵容组合</h2>
            <div class="flex gap-3 overflow-x-auto pb-2 mb-4">
                <div class="flex-shrink-0 w-[160px] glass-panel rounded-2xl p-3 border-2 border-[#FF9500] bg-[#FF9500]/10">
                    <div class="flex items-center justify-center -space-x-2 mb-2">
                        <div class="w-10 h-10 rounded-full border-2 border-[#121212] bg-pink-500 flex justify-center items-center text-white text-xs font-bold z-10">咪</div>
                        <div class="w-10 h-10 rounded-full border-2 border-[#121212] bg-blue-600 flex justify-center items-center text-white text-xs font-bold">大</div>
                    </div>
                    <h3 class="text-white text-xs font-bold text-center">黑猫侦探社系列</h3>
                    <p class="text-[9px] text-gray-400 text-center mt-1">咪仔 & 大一先生</p>
                </div>
            </div>

            <h2 class="text-white text-sm font-bold mb-3 mt-6">音频编排</h2>
            <div class="glass-panel rounded-2xl p-4 flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <span class="text-white text-sm">包含片头音效</span>
                    <div class="relative inline-block w-10 mr-2 align-middle select-none">
                        <input type="checkbox" checked class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all z-10 top-0.5 left-0.5"/>
                        <label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-600 cursor-pointer transition-colors"></label>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 w-full p-4 bg-gradient-to-t from-black to-transparent pb-8">
            <button class="w-full py-4 rounded-xl bg-gradient-to-r from-[#FF9500] to-[#FFD60A] text-black font-bold text-lg shadow-lg">生成双人播客</button>
        </div>
    </div>
    <script>const { createApp } = Vue; createApp({}).mount('#app');</script>
</body>
</html>
