<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声读 Pro - 情感合成 AI 升级版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sr-orange-start': '#FF9500',
                        'sr-orange-end': '#FFD60A',
                        'sr-black': '#050505',
                        'sr-card': 'rgba(255, 255, 255, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }

        /* AI 魔法框流光边框 */
        .ai-magic-box { position: relative; border-radius: 1rem; background: rgba(0,0,0,0.6); border: 1px solid rgba(255, 149, 0, 0.2); transition: all 0.3s ease; }
        .ai-magic-box:focus-within { border-color: rgba(255, 149, 0, 0.6); box-shadow: 0 0 15px rgba(255, 149, 0, 0.15); }
        .ai-magic-box.generating::before {
            content: ""; position: absolute; inset: -1px; border-radius: 1rem;
            background: linear-gradient(90deg, #FF9500, #8B5CF6, #FFD60A, #FF9500);
            background-size: 200% 100%; z-index: -1; filter: blur(3px);
            animation: moveGradient 2s linear infinite;
        }
        @keyframes moveGradient { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        /* 打字机光标 */
        .typing-cursor::after { content: '|'; animation: blink 1s step-end infinite; color: #FF9500; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen font-sans">

<div id="app" class="w-[390px] h-[844px] bg-sr-black rounded-[40px] overflow-hidden relative shadow-2xl flex flex-col border-[8px] border-gray-800">

    <div class="h-14 flex justify-between items-center px-4 mt-8 z-40">
        <button class="w-8 h-8 flex justify-center items-center text-white"><i class="fas fa-arrow-left text-sm"></i></button>
        <h1 class="text-white font-bold text-lg">文字转语音</h1>
        <div class="w-8"></div>
    </div>

    <div class="flex-1 overflow-y-auto px-5 pt-2 pb-32">

        <div class="flex justify-center mb-6">
            <div class="bg-black border border-white/10 rounded-full p-1 flex w-[280px]">
                <button class="flex-1 py-1.5 rounded-full text-sm font-bold text-gray-500 hover:text-white transition-all">短文本 <span class="text-[10px] opacity-70">300字</span></button>
                <button class="flex-1 py-1.5 rounded-full text-sm font-bold glass-panel text-[#FF9500] shadow-md transition-all flex justify-center items-center gap-1">
                    AI 编排 <i class="fas fa-wand-magic-sparkles text-[10px]"></i>
                </button>
            </div>
        </div>

        <div class="ai-magic-box p-3 mb-6" :class="{'generating': isGenerating}">
            <div class="flex items-start gap-2 mb-2">
                <i class="fas fa-sparkles text-[#FF9500] mt-0.5 text-xs"></i>
                <textarea v-model="userPrompt" class="w-full bg-transparent text-[#FFD60A] placeholder-[#FF9500]/50 outline-none resize-none text-sm font-medium" rows="2" placeholder="输入场景灵感 (例如：情侣雨中吵架，男生无奈女生激动)，AI 将自动生成带情绪标签的配音稿..."></textarea>
            </div>
            <div class="flex justify-end border-t border-white/5 pt-2">
                <button @click="generateScript" :disabled="isGenerating || !userPrompt" class="bg-white/10 hover:bg-white/20 text-[#FFD60A] text-xs font-bold px-4 py-1.5 rounded-full transition-colors active:scale-95 disabled:opacity-50 flex items-center gap-1">
                    <i v-if="!isGenerating" class="fas fa-pen-nib"></i>
                    <i v-else class="fas fa-circle-notch fa-spin"></i>
                    {{ isGenerating ? 'AI 正在创作剧本...' : '让 AI 帮我写' }}
                </button>
            </div>
        </div>

        <div class="glass-panel rounded-2xl p-4 flex flex-col min-h-[320px] focus-within:border-[#FF9500]/40 transition-colors relative">

            <div class="flex gap-2 mb-4 overflow-x-auto hide-scrollbar">
                <button class="flex-shrink-0 px-3 py-1 rounded bg-white/5 border border-white/10 text-gray-300 text-[11px] hover:bg-white/10">#小说朗读</button>
                <button class="flex-shrink-0 px-3 py-1 rounded bg-white/5 border border-white/10 text-gray-300 text-[11px] hover:bg-white/10">#新闻播报</button>
                <button class="flex-shrink-0 px-3 py-1 rounded bg-white/5 border border-white/10 text-gray-300 text-[11px] hover:bg-white/10 flex items-center gap-1">#情绪撒娇 <i class="fas fa-crown text-[#FFD60A]"></i></button>
            </div>

            <textarea v-model="scriptContent" id="main-editor" class="w-full flex-1 bg-transparent text-white placeholder-gray-600 outline-none resize-none text-[15px] leading-relaxed" :class="{'typing-cursor': isGenerating}" placeholder="输入要转换为语音的文字...&#10;VIP用户可输入 #开心 等指令控制情绪。"></textarea>

            <div class="flex justify-between items-end mt-4 pt-2">
                <div class="flex gap-4">
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer group">
                        <div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex justify-center items-center text-gray-400 group-hover:text-white transition-colors"><i class="fas fa-user-voice text-sm"></i></div>
                        <span class="text-[10px] text-gray-500 group-hover:text-gray-300">选音色</span>
                    </div>
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer group">
                        <div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex justify-center items-center text-gray-400 group-hover:text-white transition-colors"><i class="fas fa-music text-sm"></i></div>
                        <span class="text-[10px] text-gray-500 group-hover:text-gray-300">加配乐</span>
                    </div>
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer group">
                        <div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex justify-center items-center text-gray-400 group-hover:text-white transition-colors"><i class="fas fa-language text-sm"></i></div>
                        <span class="text-[10px] text-gray-500 group-hover:text-gray-300">多语言</span>
                    </div>
                </div>

                <span class="text-[11px] font-mono mb-2" :class="scriptContent.length > 500 ? 'text-red-500' : 'text-gray-500'">
                        <span class="text-[#FF9500]">{{ scriptContent.length }}</span> / 500
                    </span>
            </div>
        </div>

    </div>

    <div class="absolute bottom-0 w-full px-5 pb-8 bg-gradient-to-t from-black via-black/90 to-transparent z-50">
        <button class="w-full py-3.5 rounded-xl bg-gradient-to-r from-sr-orange-start to-sr-orange-end text-black font-bold text-[16px] shadow-[0_4px_20px_rgba(255,149,0,0.3)] active:scale-95 transition-transform flex justify-center items-center gap-2">
            <i class="fas fa-pen text-sm"></i> 立即合成配音
        </button>
    </div>

</div>

<script>
    const { createApp, ref, nextTick } = Vue;
    createApp({
        setup() {
            const userPrompt = ref('一对情侣在雨中吵架分手，男生很无奈，女生很激动。');
            const scriptContent = ref('');
            const isGenerating = ref(false);

            // 模拟大模型 Agent 流式输出带有 TTS 标签的文本
            const generateScript = async () => {
                if (!userPrompt.value || isGenerating.value) return;

                isGenerating.value = true;
                scriptContent.value = '';

                // 模拟网络请求延迟
                await new Promise(r => setTimeout(r, 600));

                // 模拟 Python Agent 返回的标准排版剧本
                const aiResponse =
                    `#无奈
【深呼吸】我真的不知道还能怎么做，<停顿1s>我已经尽力了。

#激动
【冷笑】尽力？你的尽力就是一次又一次地敷衍我吗？！

#疲惫
【叹气】随你怎么想吧，如果分开更好，那我同意。`;

                // 模拟打字机流式输出效果到底部标准编辑器
                for (let i = 0; i < aiResponse.length; i++) {
                    scriptContent.value += aiResponse.charAt(i);
                    await new Promise(r => setTimeout(r, 30));
                }

                isGenerating.value = false;
            };

            return { userPrompt, scriptContent, isGenerating, generateScript }
        }
    }).mount('#app');
</script>
</body>
</html>
