<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声读 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen font-sans">
    <div id="app" class="w-[390px] h-[844px] bg-gradient-to-b from-[#1a1a2e] to-[#050505] rounded-[40px] overflow-hidden relative shadow-2xl flex flex-col border-[8px] border-gray-800 px-6 pt-24">
        
        <div class="text-center mb-12">
            <h1 class="text-3xl font-bold text-white tracking-wider mb-2">登录 / 注册</h1>
            <p class="text-sm text-gray-400">欢迎使用声读</p>
        </div>

        <div class="flex p-1 bg-black/40 border border-white/5 rounded-xl mb-8">
            <button class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-[#4F46E5] text-white shadow-lg">密码登录</button>
            <button class="flex-1 py-2.5 text-sm font-bold rounded-lg text-gray-500">验证码登录</button>
        </div>

        <div class="glass-panel rounded-2xl p-5 mb-6">
            <div class="mb-4">
                <input type="text" placeholder="请输入手机号" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3.5 text-white placeholder-gray-500 outline-none focus:border-[#4F46E5] transition-colors">
            </div>
            <div class="mb-6">
                <input type="password" placeholder="请输入密码" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3.5 text-white placeholder-gray-500 outline-none focus:border-[#4F46E5] transition-colors">
            </div>
            <button class="w-full py-3.5 rounded-xl bg-[#4F46E5] text-white font-bold text-base shadow-[0_4px_20px_rgba(79,70,229,0.3)] active:scale-95 transition-transform">登录</button>
            
            <div class="text-center mt-6">
                <span class="text-xs text-gray-500">没有账号？ <a href="#" class="text-[#818CF8] font-bold">立即注册</a></span>
            </div>
        </div>

    </div>
    <script>const { createApp } = Vue; createApp({}).mount('#app');</script>
</body>
</html>
