<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声读 - VIP开通</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sr-orange-start': '#FF9500',
                        'sr-orange-end': '#FFD60A',
                        'sr-black': '#050505',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .vip-hero { background: linear-gradient(135deg, rgba(45, 20, 65, 0.8) 0%, rgba(20, 15, 30, 0.9) 100%); border: 1px solid rgba(212, 175, 55, 0.2); }
        
        /* 选中套餐的流光发光边框 */
        .plan-selected { border-color: #FFD60A; background: rgba(255, 214, 10, 0.1); box-shadow: 0 0 20px rgba(255, 214, 10, 0.15); }
    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen font-sans">
    <div id="app" class="w-[390px] h-[844px] bg-[#050505] rounded-[40px] overflow-hidden relative shadow-2xl flex flex-col border-[8px] border-gray-800">
        
        <div class="h-14 flex justify-between items-center px-4 mt-8 z-50">
            <button class="w-8 h-8 flex justify-center items-center text-white"><i class="fas fa-chevron-left"></i></button>
            <h1 class="text-white font-bold text-base">VIP 会员</h1>
            <div class="w-8"></div>
        </div>

        <div class="flex-1 overflow-y-auto px-5 pt-2 pb-32">
            
            <div class="vip-hero rounded-3xl p-6 mb-6 flex flex-col items-center justify-center relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-[#FFD60A]/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-500/20 rounded-full blur-3xl -ml-10 -mb-10"></div>
                
                <i class="fas fa-crown text-5xl text-gradient bg-clip-text text-transparent bg-gradient-to-r from-[#FF9500] to-[#FFD60A] mb-3 drop-shadow-lg"></i>
                <h2 class="text-2xl font-bold text-white mb-2 tracking-widest">VIP 会员</h2>
                <div class="bg-white/10 px-4 py-1.5 rounded-full text-xs text-gray-300 font-medium border border-white/5 shadow-inner">
                    当前状态：普通用户
                </div>
            </div>

            <h3 class="text-white font-bold mb-3 text-sm">套餐选择</h3>
            <div class="flex flex-col gap-3 mb-8">
                
                <div @click="selectedPlan = 'year'" class="glass-panel rounded-2xl p-4 flex justify-between items-center cursor-pointer transition-all relative overflow-hidden" :class="selectedPlan === 'year' ? 'plan-selected' : 'border-white/10 hover:border-white/20'">
                    <div class="absolute top-0 right-0 bg-gradient-to-r from-red-500 to-orange-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-bl-lg shadow-md">🔥 每日仅¥0.8</div>
                    
                    <div>
                        <h4 class="text-white font-bold text-base mb-1">年度 VIP</h4>
                        <p class="text-xs" :class="selectedPlan === 'year' ? 'text-[#FFD60A]' : 'text-gray-500'">365 天</p>
                    </div>
                    <div class="text-right">
                        <div class="flex items-baseline gap-1">
                            <span class="text-sm font-bold text-[#FFD60A]">¥</span>
                            <span class="text-3xl font-bold text-[#FFD60A]">300</span>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3">
                    <div @click="selectedPlan = 'month'" class="flex-1 glass-panel rounded-2xl p-4 flex flex-col justify-between cursor-pointer transition-all" :class="selectedPlan === 'month' ? 'plan-selected' : 'border-white/10 hover:border-white/20'">
                        <div class="mb-2">
                            <h4 class="text-white font-bold text-sm mb-0.5">月度体验</h4>
                            <p class="text-[10px]" :class="selectedPlan === 'month' ? 'text-[#FFD60A]' : 'text-gray-500'">30 天</p>
                        </div>
                        <div class="flex items-baseline gap-0.5">
                            <span class="text-xs font-bold text-white">¥</span>
                            <span class="text-xl font-bold text-white">30</span>
                        </div>
                    </div>

                    <div @click="selectedPlan = 'lifetime'" class="flex-1 glass-panel rounded-2xl p-4 flex flex-col justify-between cursor-pointer transition-all" :class="selectedPlan === 'lifetime' ? 'plan-selected' : 'border-white/10 hover:border-white/20'">
                        <div class="mb-2">
                            <h4 class="text-white font-bold text-sm mb-0.5">终身 VIP</h4>
                            <p class="text-[10px]" :class="selectedPlan === 'lifetime' ? 'text-[#FFD60A]' : 'text-gray-500'">永久有效</p>
                        </div>
                        <div class="flex items-baseline gap-0.5">
                            <span class="text-xs font-bold text-white">¥</span>
                            <span class="text-xl font-bold text-white">1000</span>
                        </div>
                    </div>
                </div>
            </div>

            <h3 class="text-white font-bold mb-3 text-sm">会员特权</h3>
            <div class="glass-panel rounded-2xl p-5 mb-8">
                <ul class="grid grid-cols-2 gap-y-4 gap-x-2">
                    <li class="flex items-center gap-2 text-sm text-gray-200"><i class="fas fa-check text-green-500 text-xs"></i> 无限字数合成</li>
                    <li class="flex items-center gap-2 text-sm text-gray-200"><i class="fas fa-check text-green-500 text-xs"></i> 情感合成/指令</li>
                    <li class="flex items-center gap-2 text-sm text-gray-200"><i class="fas fa-check text-green-500 text-xs"></i> AI 播客完整版</li>
                    <li class="flex items-center gap-2 text-sm text-gray-200"><i class="fas fa-check text-green-500 text-xs"></i> 专属声音复刻</li>
                    <li class="flex items-center gap-2 text-sm text-gray-200"><i class="fas fa-check text-green-500 text-xs"></i> WebSocket 流式</li>
                    <li class="flex items-center gap-2 text-sm text-gray-200"><i class="fas fa-check text-green-500 text-xs"></i> 同声传译/翻译</li>
                    <li class="flex items-center gap-2 text-sm text-gray-200"><i class="fas fa-check text-green-500 text-xs"></i> 边听边问无限次</li>
                    <li class="flex items-center gap-2 text-sm text-gray-200"><i class="fas fa-check text-green-500 text-xs"></i> 优先客服支持</li>
                </ul>
            </div>

            <h3 class="text-white font-bold mb-3 text-sm">套餐对比</h3>
            <div class="glass-panel rounded-2xl overflow-hidden mb-6">
                <div class="flex bg-black/40 border-b border-white/10 p-3">
                    <div class="flex-1 text-xs text-[#FFD60A] font-bold text-center">功能</div>
                    <div class="flex-1 text-xs text-gray-400 font-bold text-center">免费版</div>
                    <div class="flex-1 text-xs text-[#FFD60A] font-bold text-center">VIP版</div>
                </div>
                <div class="flex border-b border-white/5 p-3 hover:bg-white/5 transition-colors">
                    <div class="flex-1 text-xs text-gray-300 text-center">每日字数</div>
                    <div class="flex-1 text-xs text-gray-500 text-center">100字</div>
                    <div class="flex-1 text-xs text-[#FF9500] font-bold text-center">无限</div>
                </div>
                <div class="flex border-b border-white/5 p-3 hover:bg-white/5 transition-colors">
                    <div class="flex-1 text-xs text-gray-300 text-center">边听边问</div>
                    <div class="flex-1 text-xs text-gray-500 text-center">3次/天</div>
                    <div class="flex-1 text-xs text-[#FF9500] font-bold text-center">无限次</div>
                </div>
                <div class="flex border-b border-white/5 p-3 hover:bg-white/5 transition-colors">
                    <div class="flex-1 text-xs text-gray-300 text-center">情感合成</div>
                    <div class="flex-1 text-xs text-gray-500 text-center">—</div>
                    <div class="flex-1 text-xs text-green-500 text-center"><i class="fas fa-check"></i></div>
                </div>
                <div class="flex border-b border-white/5 p-3 hover:bg-white/5 transition-colors">
                    <div class="flex-1 text-xs text-gray-300 text-center">声音克隆</div>
                    <div class="flex-1 text-xs text-gray-500 text-center">—</div>
                    <div class="flex-1 text-xs text-green-500 text-center"><i class="fas fa-check"></i></div>
                </div>
                <div class="flex p-3 hover:bg-white/5 transition-colors">
                    <div class="flex-1 text-xs text-gray-300 text-center">流式生成</div>
                    <div class="flex-1 text-xs text-gray-500 text-center">—</div>
                    <div class="flex-1 text-xs text-green-500 text-center"><i class="fas fa-check"></i></div>
                </div>
            </div>

        </div>

        <div class="absolute bottom-0 w-full p-5 bg-gradient-to-t from-[#050505] via-[#050505]/95 to-transparent z-40 pb-8">
            <button class="w-full py-4 rounded-xl bg-gradient-to-r from-[#FF9500] to-[#FFD60A] text-black font-bold text-lg shadow-[0_4px_20px_rgba(255,149,0,0.3)] active:scale-95 transition-transform">
                立即开通 {{ selectedPlan === 'year' ? '年度' : (selectedPlan === 'month' ? '月度' : '终身') }}会员
            </button>
            <p class="text-center text-[10px] text-gray-500 mt-3">开通即代表同意《声读VIP服务协议》</p>
        </div>

    </div>

    <script>
        const { createApp, ref } = Vue; 
        createApp({ 
            setup() { 
                // 默认选中年度会员（高性价比主推）
                const selectedPlan = ref('year'); 
                return { selectedPlan } 
            } 
        }).mount('#app');
    </script>
</body>
</html>
