<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声读 - 声音复刻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }
        .animate-ripple { animation: ripple 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen font-sans">
    <div id="app" class="w-[390px] h-[844px] bg-[#050505] rounded-[40px] overflow-hidden relative shadow-2xl flex flex-col border-[8px] border-gray-800">
        
        <div class="h-14 flex justify-between items-center px-4 mt-8">
            <button class="text-white"><i class="fas fa-chevron-left"></i></button>
            <h1 class="text-white font-bold text-base"><i class="fas fa-fingerprint text-[#FF9500]"></i> 专属声音复刻</h1>
            <div class="w-8"></div>
        </div>

        <div class="flex-1 overflow-y-auto px-5 pt-4 pb-10">
            <p class="text-sm text-gray-400 mb-6 text-center">提供 10-30 秒的纯净语音，即可克隆你的音色。</p>

            <div class="glass-panel rounded-3xl p-5 mb-6 text-center border border-green-500/30">
                <span class="bg-white/10 text-white text-[10px] font-bold px-2 py-1 rounded-full"><i class="fas fa-1"></i> 提供样本</span>
                
                <div class="mt-8 mb-10 text-green-400 font-mono text-xl font-bold tracking-widest">{{ time }}</div>

                <div class="flex justify-center items-center h-32 relative">
                    <div v-if="isRecording" class="absolute inset-0 bg-green-500/30 rounded-full animate-ripple w-24 h-24 m-auto"></div>
                    <button @click="toggleRecord" class="relative w-20 h-20 rounded-full flex justify-center items-center text-white text-3xl shadow-lg z-10 transition-colors" :class="isRecording ? 'bg-red-500' : 'bg-gradient-to-b from-gray-700 to-gray-800 border-2 border-gray-600'">
                        <i :class="isRecording ? 'fas fa-stop' : 'fas fa-microphone'"></i>
                    </button>
                </div>
                <p class="text-gray-400 text-xs mt-2">{{ isRecording ? '点击停止' : '点击开始录制' }}</p>
            </div>

            <div class="glass-panel p-5 rounded-3xl opacity-50 relative">
                <div class="absolute inset-0 bg-black/50 backdrop-blur-sm rounded-3xl z-10 flex flex-col justify-center items-center text-gray-400">
                    <i class="fas fa-lock text-xl mb-1"></i><span class="text-[10px]">请先录制声音</span>
                </div>
                <h3 class="text-white text-xs font-bold mb-3"><i class="fas fa-2"></i> 试听效果</h3>
                <textarea class="w-full bg-black/40 rounded-xl p-3 text-white text-sm" rows="3" placeholder="输入文本..."></textarea>
                <button class="w-full mt-4 py-3 rounded-xl bg-gray-700 text-gray-400 font-bold">合成试听</button>
            </div>
        </div>
    </div>
    <script>
        const { createApp, ref } = Vue; 
        createApp({ 
            setup() { 
                const isRecording = ref(false); 
                const time = ref('00:00:00');
                const toggleRecord = () => { isRecording.value = !isRecording.value; time.value = isRecording.value ? '00:00:12' : '00:00:00'; }
                return { isRecording, time, toggleRecord } 
            } 
        }).mount('#app');
    </script>
</body>
</html>
